{% assign image_alt = include.alt | default: include.caption | default: "" %}

<figure style="display: table; margin: 0 auto 1rem;">
  <picture>
    {% if include.avif %}
    <source type="image/avif" srcset="{{ include.avif }}">
    {% endif %}
    {% if include.webp %}
    <source type="image/webp" srcset="{{ include.webp }}">
    {% endif %}
    <img
      src="{{ include.src }}"
      alt="{{ image_alt | escape }}"
      title="{{ image_alt | escape }}"
      loading="lazy"
      decoding="async">
  </picture>
  {% if include.caption %}
  <figcaption style="display: table-caption; caption-side: bottom; text-align: left;">
    <small><em>{{ include.caption }}</em></small>
  </figcaption>
  {% endif %}
</figure>
